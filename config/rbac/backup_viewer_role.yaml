# permissions for end users to view backups.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-backup-operator
    app.kubernetes.io/managed-by: kustomize
  name: backup-viewer-role
rules:
- apiGroups:
  - devopsdayszh.operators.com
  resources:
  - backups
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - devopsdayszh.operators.com
  resources:
  - backups/status
  verbs:
  - get
